<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Aliandra & Adinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #333; font-family: 'Montserrat', sans-serif; }

        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background-color: #fff;
            overflow: hidden;
        }

        /* LAYER DASAR */
        .bg-wallpaper { position: absolute; inset: 0; z-index: 1; background: url('wallpaper.png') no-repeat center center; background-size: cover; }
        .rumah-adat { position: absolute; bottom: 80px; left: 0; width: 100%; z-index: 2; object-fit: contain; }
        .frame-ornament { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background: url('frame_ornament.png') no-repeat center top; background-size: 100% 100%; pointer-events: none; }

        /* KONTEN TENGAH */
        .content-area { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; width: 85%; }
        .logo-aa { width: 100%; max-width: 260px; margin-bottom: 25px; }
        .btn-buka { background-color: #8b5e34; color: #fff; padding: 12px 35px; border-radius: 50px; font-weight: 600; font-size: 13px; letter-spacing: 1.5px; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }

        /* SISTEM FLORAL TEROPTIMASI */
        .floral { position: absolute; z-index: 30; pointer-events: none; }

        /* AREA PINK (Bunga Tengah Atas) - Menempel ke bingkai samping */
        .f-mid-top-l { top: 20%; left: -5%; width: 40%; } /* Pink Kiri */
        .f-mid-top-r { top: 20%; right: -5%; width: 40%; } /* Pink Kanan */

        /* AREA HIJAU (Bunga Tengah Bawah) - Di atas rumah adat */
        .f-mid-bot-l { bottom: 25%; left: -5%; width: 35%; } /* Hijau Kiri */
        .f-mid-bot-r { bottom: 25%; right: -5%; width: 35%; } /* Hijau Kanan */

        /* AREA BIRU (Bunga Dasar Paling Bawah) */
        .f-base-l { bottom: -10px; left: -5%; width: 45%; z-index: 40; } /* Biru Kiri */
        .f-base-r { bottom: -10px; right: -5%; width: 45%; z-index: 40; } /* Biru Kanan */
        .f-base-center { bottom: -20px; left: 50%; transform: translateX(-50%); width: 110%; z-index: 45; } /* Biru Tengah (Penutup Pondasi) */

        /* Bunga Pojok Atas (Tetap Ada) */
        .f-corner-tl { top: 0; left: 0; width: 40%; }
        .f-corner-tr { top: 0; right: 0; width: 40%; }

        .bird-gif { position: absolute; top: 12%; right: 15%; width: 70px; z-index: 4; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="bg-wallpaper"></div>
        <img src="rumah_adat.png" class="rumah-adat">
        <div class="frame-ornament"></div>
        <img src="burung_terbang.gif" class="bird-gif">

        <div class="content-area">
            <img src="logo_initial_gold.png" class="logo-aa">
            <button class="btn-buka">BUKA UNDANGAN</button>
        </div>

        <img src="bunga_kiri_atas.png" class="floral f-corner-tl">
        <img src="bunga_kanan_atas.png" class="floral f-corner-tr">

        <img src="bunga_tengah_atas_kiri.png" class="floral f-mid-top-l">
        <img src="bunga_tengah_atas_kanan.png" class="floral f-mid-top-r">

        <img src="bunga_tengah_bawah_kiri.png" class="floral f-mid-bot-l">
        <img src="bunga_tengah_bawah_kanan.png" class="floral f-mid-bot-r">

        <img src="bunga_bawah_kiri.png" class="floral f-base-l">
        <img src="bunga_bawah_kanan.png" class="floral f-base-r">
        <img src="bunga_bawah_tengah.png" class="floral f-base-center">

    </div>

</body>
</html>
