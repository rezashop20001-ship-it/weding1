<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Digital A&A - Perbaikan Tata Letak</title>
    <style>
        /* RESET DASAR */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mengunci layar utama agar elemen dekorasi presisi */
            background-color: #f0f0f0;
            font-family: 'Georgia', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* CONTAINER UTAMA (COVER) */
        .cover-wrapper {
            position: relative;
            width: 100%;
            height: 100vh; /* Tinggi penuh layar */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- LAYER 1: WALLPAPER BACKGROUND --- */
        .bg-wallpaper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Memenuhi layar */
            z-index: 1;
        }

        /* --- LAYER 2: RUMAH ADAT (DI BELAKANG BINGKAI) --- */
        .rumah-adat {
            position: absolute;
            bottom: 10%; /* Sedikit diangkat agar fondasi tidak tertutup bunga */
            width: 90%;
            height: auto;
            max-height: 40%;
            object-fit: contain;
            z-index: 2;
            opacity: 0.9;
        }

        /* --- LAYER 3: BINGKAI ORNAMEN (FIXED TOP) --- */
        .frame-top {
            position: absolute;
            top: 0; /* Menempel paling atas */
            left: 50%;
            transform: translateX(-50%);
            width: 100%; /* Lebar penuh */
            height: 100%; /* Tinggi penuh agar proporsi terjaga */
            object-fit: contain; /* Bingkai utuh, tidak terpotong */
            object-position: top; /* Prioritaskan bagian atas */
            z-index: 3;
            pointer-events: none; /* Biar tombol di bawahnya bisa di-klik */
        }

        /* --- LAYER 4: KONTEN UTAMA (LOGO & TOMBOL) --- */
        .content-container {
            position: relative;
            z-index: 10; /* Di atas bingkai dan rumah */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-top: -50px; /* Menyesuaikan posisi vertikal agar pas di tengah bingkai */
        }

        .logo-aa {
            width: 220px; /* Ukuran Logo Emas */
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .btn-buka {
            background-color: #96693d; /* Warna coklat sesuai contoh */
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .btn-buka:active { transform: scale(0.95); }

        /* --- LAYER 5: DEKORASI FLORAL (PENTING!) --- */
        .floral {
            position: absolute;
            pointer-events: none; /* Wajib agar tidak menghalangi klik */
            z-index: 20; /* Paling tinggi agar menimpa bingkai dan rumah */
        }

        /* Area Atas (Sesuai Coretan Pink) */
        .f-top-left { top: 0; left: 0; width: 35%; }
        .f-top-right { top: 0; right: 0; width: 35%; }

        /* Area Bawah (Sesuai Coretan Hijau & Teal) */
        /* Kita kunci di bottom: 0 agar tidak hilang */
        .f-bot-left { bottom: 0; left: 0; width: 45%; z-index: 25; }
        .f-bot-right { bottom: 0; right: 0; width: 45%; z-index: 25; }
        
        /* Bunga Tengah Bawah (Teal) */
        .f-bot-center { 
            bottom: -10px; /* Sedikit diturunkan agar menyatu dengan dasar */
            left: 50%; 
            transform: translateX(-50%); 
            width: 70%; 
            z-index: 26; /* Paling depan */
        }

    </style>
</head>
<body>

    <div class="cover-wrapper">
        <img src="wallpaper.png" class="bg-wallpaper" alt="Background">

        <img src="rumah_adat.png" class="rumah-adat" alt="Rumah Adat">

        <img src="frame_ornament.png" class="frame-top" alt="Frame Ornament">

        <div class="content-container">
            <img src="logo_aa_gold.png" class="logo-aa" alt="Logo A&A">
            <a href="#" class="btn-buka">Buka Undangan</a>
        </div>

        <img src="bunga_kiri_atas.png" class="floral f-top-left" alt="Floral Top Left">
        <img src="bunga_kanan_atas.png" class="floral f-top-right" alt="Floral Top Right">

        <img src="bunga_kiri_bawah.png" class="floral f-bot-left" alt="Floral Bottom Left">
        <img src="bunga_kanan_bawah.png" class="floral f-bot-right" alt="Floral Bottom Right">
        <img src="bunga_bawah_tengah.png" class="floral f-bot-center" alt="Floral Bottom Center">

    </div>

</body>
</html>
