<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Aliandra & Adinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@300;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container Utama */
        .invitation-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* Standar Mobile Web */
            height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }

        /* LAYER 1: Base Wallpaper */
        .layer-base {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: url('wallpaper.png') no-repeat center center;
            background-size: cover;
        }

        /* LAYER 2: Rumah Adat */
        .layer-house {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* LAYER 3: Frame Ornament */
        .layer-frame {
            position: absolute;
            inset: 0;
            z-index: 3;
            background: url('frame_ornament.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            opacity: 0.8;
        }

        /* LAYER 4: Content (Text & Button) */
        .layer-content {
            position: absolute;
            inset: 0;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-bottom: 100px;
        }

        .logo-initial {
            width: 220px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.3));
        }

        .btn-open {
            background-color: #8B5E34; /* Warna cokelat sesuai video */
            color: #fff;
            padding: 12px 35px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* DEKORASI FLORAL (Z-INDEX: 20+) */
        .floral {
            position: absolute;
            z-index: 20;
            pointer-events: none;
        }

        /* Atas */
        .f-top-left { top: 0; left: 0; width: 40%; }
        .f-top-right { top: 0; right: 0; width: 40%; }
        .f-top-mid-left { top: 10px; left: 15%; width: 25%; z-index: 21; }
        .f-top-mid-right { top: 10px; right: 15%; width: 25%; z-index: 21; }

        /* Bawah */
        .f-bot-left { bottom: 0; left: 0; width: 35%; }
        .f-bot-right { bottom: 0; right: 0; width: 35%; }
        .f-bot-mid-left { bottom: 0; left: 10%; width: 30%; z-index: 22; }
        .f-bot-mid-right { bottom: 0; right: 10%; width: 30%; z-index: 22; }
        
        /* Bawah Tengah (Layering Depth) */
        .f-bot-center-back { bottom: -5px; left: 50%; transform: translateX(-50%); width: 50%; z-index: 19; opacity: 0.9; }
        .f-bot-center-front { bottom: -10px; left: 50%; transform: translateX(-50%); width: 60%; z-index: 25; }

        /* Burung Terbang */
        .bird-anim {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 80px;
            z-index: 10;
            opacity: 0.7;
        }

        /* Animasi Sederhana */
        .fade-in-up {
            animation: fadeInUp 1.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        
        <div class="layer-base"></div>
        <img src="rumah_adat.png" alt="Rumah Adat" class="layer-house">
        <div class="layer-frame"></div>

        <img src="burung_terbang.gif" alt="Bird" class="bird-anim">

        <div class="layer-content fade-in-up">
            <img src="logo_initial_gold.png" alt="A&A" class="logo-initial">
            <button class="btn-open">BUKA UNDANGAN</button>
        </div>

        <img src="bunga_kiri_atas.png" class="floral f-top-left">
        <img src="bunga_kanan_atas.png" class="floral f-top-right">
        <img src="bunga_tengah_atas_kiri.png" class="floral f-top-mid-left">
        <img src="bunga_tengah_atas_kanan.png" class="floral f-top-mid-right">

        <img src="bunga_bawah_kiri.png" class="floral f-bot-left">
        <img src="bunga_bawah_kanan.png" class="floral f-bot-right">
        <img src="bunga_tengah_bawah_kiri.png" class="floral f-bot-mid-left">
        <img src="bunga_tengah_bawah_kanan.png" class="floral f-bot-mid-right">
        
        <img src="bunga_bawah_tengah_back.png" class="floral f-bot-center-back">
        <img src="bunga_bawah_tengah.png" class="floral f-bot-center-front">

    </div>

</body>
</html>
