<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Aliandra & Adinda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #222; font-family: 'Montserrat', sans-serif; }

        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background-color: #fff;
            overflow: hidden;
        }

        /* LAYER DASAR */
        .bg-wallpaper { position: absolute; inset: 0; z-index: 1; background: url('wallpaper.png') no-repeat center center; background-size: cover; }
        
        /* Rumah Adat agak dinaikkan sedikit biar pondasinya tidak terlalu mepet bawah */
        .rumah-adat { position: absolute; bottom: 100px; left: 0; width: 100%; z-index: 2; object-fit: contain; }
        
        .frame-ornament { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; background: url('frame_ornament.png') no-repeat center top; background-size: 100% 100%; pointer-events: none; }

        /* KONTEN TENGAH (Logo & Tombol) */
        .content-area { position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; width: 85%; }
        .logo-aa { width: 100%; max-width: 240px; margin-bottom: 20px; }
        .btn-buka { background-color: #8b5e34; color: #fff; padding: 12px 35px; border-radius: 50px; font-weight: 600; font-size: 13px; letter-spacing: 1.5px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }

        /* SISTEM FLORAL REVISI TOTAL */
        .floral { position: absolute; pointer-events: none; }

        /* 1. Bunga Pojok Paling Atas */
        .f-corner-tl { top: 0; left: 0; width: 45%; z-index: 30; }
        .f-corner-tr { top: 0; right: 0; width: 45%; z-index: 30; }

        /* 2. AREA PINK (Tengah Atas Samping) - DIBEBAWAHIN DIKIT */
        .f-mid-top-l { top: 25%; left: -5%; width: 40%; z-index: 31; } 
        .f-mid-top-r { top: 25%; right: -5%; width: 40%; z-index: 31; }

        /* 3. AREA HIJAU (Tengah Bawah Samping) - DIBAWAHIN LAGI BIAR GAK DEMPET */
        .f-mid-bot-l { bottom: 18%; left: -8%; width: 38%; z-index: 32; } 
        .f-mid-bot-r { bottom: 18%; right: -8%; width: 38%; z-index: 32; }

        /* 4. AREA BIRU (Bunga Dasar) - DIBUAT TIMBUL PALING DEPAN */
        /* Bawah Kiri & Kanan */
        .f-base-l { bottom: -5px; left: -5%; width: 48%; z-index: 100; } 
        .f-base-r { bottom: -5px; right: -5%; width: 48%; z-index: 100; }
        
        /* Bunga Dasar Tengah (Penutup Pondasi Rumah) */
        .f-base-center { 
            bottom: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 110%; 
            z-index: 110; /* Z-index tertinggi agar menimpa semua di bawah */
        }

        .bird-gif { position: absolute; top: 12%; right: 15%; width: 70px; z-index: 4; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="bg-wallpaper"></div>
        <img src="rumah_adat.png" class="rumah-adat">
        <div class="frame-ornament"></div>
        <img src="burung_terbang.gif" class="bird-gif">

        <div class="content-area">
            <img src="logo_initial_gold.png" class="logo-aa">
            <button class="btn-buka">BUKA UNDANGAN</button>
        </div>

        <img src="bunga_kiri_atas.png" class="floral f-corner-tl">
        <img src="bunga_kanan_atas.png" class="floral f-corner-tr">
        <img src="bunga_tengah_atas_kiri.png" class="floral f-mid-top-l">
        <img src="bunga_tengah_atas_kanan.png" class="floral f-mid-top-r">

        <img src="bunga_tengah_bawah_kiri.png" class="floral f-mid-bot-l">
        <img src="bunga_tengah_bawah_kanan.png" class="floral f-mid-bot-r">

        <img src="bunga_bawah_kiri.png" class="floral f-base-l">
        <img src="bunga_bawah_kanan.png" class="floral f-base-r">
        <img src="bunga_bawah_tengah.png" class="floral f-base-center">

    </div>

</body>
</html>
