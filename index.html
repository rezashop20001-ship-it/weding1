<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Digital A&A - Full Layout</title>
    <style>
        /* Dasar & Mencegah Layar Goyang */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow-y: auto; /* Agar Pull-to-Refresh aktif */
            overflow-x: hidden;
            background-color: #f4f4f4;
            -webkit-overflow-scrolling: touch;
        }

        /* Container Section Utama */
        .section-cover {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Elemen dekorasi tetap rapi di dalam */
        }

        /* LAYER 1: Paling Dasar (Wallpaper) */
        .img-wallpaper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* LAYER 2: Rumah Adat */
        .img-rumah {
            position: absolute;
            bottom: 12%; /* Diatur agar tidak tenggelam bunga bawah */
            width: 100%;
            height: auto;
            max-height: 40%;
            object-fit: contain;
            z-index: 2;
        }

        /* LAYER 3: Bingkai (Pink - Sesuai coretan atas) */
        .img-frame {
            position: absolute;
            top: 0; /* Menempel ke atas agar tidak terpotong */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top;
            z-index: 3;
            pointer-events: none;
        }

        /* LAYER 4: Konten (Logo Emas & Tombol) */
        .content-area {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -30px; /* Geser sedikit biar pas di tengah frame */
        }

        .logo-aa {
            width: 200px; /* Logo Inisial Emas */
            height: auto;
            margin-bottom: 25px;
        }

        .btn-buka {
            background-color: #96693d;
            color: #fff;
            padding: 12px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        /* LAYER 5: Dekorasi Floral (Z-index 20+ agar menimpa Frame) */
        .floral {
            position: absolute;
            pointer-events: none;
            z-index: 20;
        }

        /* Atas (Coretan Pink) */
        .f-top-left { top: 0; left: 0; width: 40%; }
        .f-top-right { top: 0; right: 0; width: 40%; }
        .f-top-mid-left { top: 0; left: 15%; width: 30%; z-index: 21; }
        .f-top-mid-right { top: 0; right: 15%; width: 30%; z-index: 21; }

        /* Tengah/Bawah Samping (Coretan Hijau) */
        .f-bot-left { bottom: 0; left: 0; width: 45%; z-index: 25; }
        .f-bot-right { bottom: 0; right: 0; width: 45%; z-index: 25; }

        /* Paling Bawah Tengah (Coretan Teal) */
        .f-bot-center { 
            bottom: -5px; left: 50%; 
            transform: translateX(-50%); 
            width: 70%; z-index: 26; 
        }
        .f-bot-center-back { 
            bottom: 5px; left: 50%; 
            transform: translateX(-50%); 
            width: 85%; z-index: 23; 
            opacity: 0.8;
        }

        /* Burung Terbang */
        .bird-gif {
            position: absolute;
            top: 15%; left: 20%;
            width: 70px;
            z-index: 5;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="section-cover">
        <img src="wallpaper.png" class="img-wallpaper">

        <img src="rumah_adat.png" class="img-rumah">

        <img src="frame_ornament.png" class="img-frame">

        <img src="burung_terbang.gif" class="bird-gif">

        <div class="content-area">
            <img src="logo_aa.png" class="logo-aa">
            <a href="#" class="btn-buka">Buka Undangan</a>
        </div>

        <img src="bunga_kiri_atas.png" class="floral f-top-left">
        <img src="bunga_kanan_atas.png" class="floral f-top-right">
        <img src="bunga_tengah_atas_kiri.png" class="floral f-top-mid-left">
        <img src="bunga_tengah_atas_kanan.png" class="floral f-top-mid-right">

        <img src="bunga_bawah_tengah_back.png" class="floral f-bot-center-back">
        <img src="bunga_bawah_kiri.png" class="floral f-bot-left">
        <img src="bunga_bawah_kanan.png" class="floral f-bot-right">
        <img src="bunga_bawah_tengah.png" class="floral f-bot-center">
    </div>

</body>
</html>
